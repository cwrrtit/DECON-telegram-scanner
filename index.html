<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECON Mini App</title>
    
    <!-- External styling or scripts (like html5-qrcode library) -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* ==========================================
           YOUR EXISTING APP STYLES (Keep yours here)
           ========================================== */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Example styles for the scan container */
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
        }

        /* ==========================================
           NEW OVERRIDES FOR SLIMMING DOWN THE CORNERS
           ========================================== */
        
        /* 1. Force the dynamic corner shapes to stay thin, regardless of color */
        #reader div div[style*="border"] {
            border-width: 2px !important; /* Forces 2px thickness instead of the blocky default */
            width: 15px !important;       /* Makes the corner arms slightly shorter and sleeker */
            height: 15px !important;      /* Makes the corner legs slightly shorter and sleeker */
            
            /* Note: We DO NOT specify border-color here. 
               This preserves your existing JavaScript code's ability 
               to turn them green on success! */
        }

        /* 2. Smoothly transition color changes (like turning green on successful scans) */
        #reader div div[style*="border"] {
            transition: border-color 0.2s ease-in-out;
        }
    </style>
</head>
<body>

    <!-- Main App UI wrapper -->
    <div class="app-container">
        
        <!-- The interactive scan feed box -->
        <div id="reader"></div>

        <!-- Serial logging metadata indicator -->
        <div class="logged-serials-container">
            <span class="label">LOGGED SERIALS (0)</span>
            <hr class="divider">
        </div>

        <!-- Complete / Submit Action Button -->
        <button class="complete-btn">Complete</button>

    </div>

    <script>
        /* ==========================================
           YOUR EXISTING JAVASCRIPT SCAN LOGIC 
           ========================================== */
        // Inside your scanning callback, the engine will still handle color swaps,
        // but the CSS above will guarantee the corners remain beautifully thin!
    </script>
</body>
</html>
