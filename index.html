<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Scanner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <style>
    :root {
      --tg-safe-top: 56px;
      --tg-safe-bottom: 24px;
      --app-corner-radius: 16px;
      --button-corner-radius: 12px;
      --status-red: #ff3b30;
      --status-amber: #f4cb11;
      --status-green: #00db62;
      --status-white: #ffffff;
      --status-idle-border: #3a3a3c;
      --ios-blue: #007aff;
      --ios-blue-pressed: #0062cc;
    }
    
    * {
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace !important;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: #ffffff;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      padding-top: var(--tg-safe-top);
      padding-bottom: 0px;
      padding-left: 16px;
      padding-right: 16px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      transition: padding-top 0.2s ease-out;
    }

    .app-container.camera-stopped {
      padding-top: calc(var(--tg-safe-top) + 70px) !important;
    }

    #scanner-container {
      position: relative; 
      width: 100%;
      max-width: 100%;
      border-radius: var(--app-corner-radius);
      overflow: hidden;
      background: #000000;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    #interactive {
      width: 100% !important;
      height: auto !important;
    }

    #interactive video {
      width: 100% !important;
      height: auto !important;
      object-fit: cover;
    }

    #interactive * {
      border: none !important;
      border-color: transparent !important;
    }

    #custom-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto; 
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #custom-viewfinder {
      position: relative;
      box-sizing: border-box;
      width: 75vw; 
      height: 55vw; 
      max-width: 75%;
      max-height: 55%;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
      border-radius: 18px; 
      cursor: pointer;
    }

    .scanner-corner {
      position: absolute;
      width: 36px; 
      height: 36px; 
      box-sizing: border-box;
      transition: border-color 0.3s ease, filter 0.3s ease;
    }

    .tl {
      top: -3px; left: -3px;
      border-top: 5px solid #ffffff !important;
      border-left: 5px solid #ffffff !important;
      border-right: none !important; 
      border-bottom: none !important;
      border-top-left-radius: 21px;
    }

    .tr {
      top: -3px; right: -3px;
      border-top: 5px solid #ffffff !important;
      border-right: 5px solid #ffffff !important;
      border-left: none !important; 
      border-bottom: none !important;
      border-top-right-radius: 21px;
    }

    .bl {
      bottom: -3px; left: -3px;
      border-bottom: 5px solid #ffffff !important;
      border-left: 5px solid #ffffff !important;
      border-right: none !important; 
      border-top: none !important;
      border-bottom-left-radius: 21px;
    }

    .br {
      bottom: -3px; right: -3px;
      border-bottom: 5px solid #ffffff !important;
      border-right: 5px solid #ffffff !important;
      border-left: none !important; 
      border-top: none !important;
      border-bottom-right-radius: 21px;
    }

    #custom-viewfinder.scan-success .scanner-corner {
      border-color: #00db62 !important; 
      filter: drop-shadow(0px 0px 4px rgba(1, 231, 40, 0.75));
    }

    #custom-viewfinder.scan-error .scanner-corner {
      border-color: #ff3b30 !important; 
      filter: drop-shadow(0px 0px 4px rgba(255, 59, 48, 0.75));
    }

    #log-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      margin-bottom: 0px;
      position: relative;
      overflow: hidden;
    }

    .log-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 4px 10px 4px;
      flex-shrink: 0;
      height: 30px;
    }

    h3 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      color: #a2a2a7; 
      letter-spacing: 0.4px;
      font-weight: 600;
      line-height: 30px;
    }

    .status-dots-group {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 30px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-sizing: border-box;
      background-color: transparent;
      border: 1px solid var(--status-idle-border);
      transition: background-color 0.15s ease-in-out, 
                  border-color 0.15s ease-in-out, 
                  box-shadow 0.15s ease-in-out;
    }

    .status-dot.active-white {
      background-color: var(--status-white);
      border-color: var(--status-white);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
    }

    .status-dot.active-green {
      background-color: var(--status-green);
      border-color: var(--status-green);
      box-shadow: 0 0 8px rgba(0, 219, 98, 0.6);
    }

    .status-dot.active-amber {
      background-color: var(--status-amber);
      border-color: var(--status-amber);
      box-shadow: 0 0 8px rgba(244, 203, 17, 0.6);
    }

    .status-dot.active-red {
      background-color: var(--status-red);
      border-color: var(--status-red);
      box-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
    }

    .status-dot.active-blue {
      background-color: var(--ios-blue);
      border-color: var(--ios-blue);
      box-shadow: 0 0 8px rgba(0, 122, 255, 0.6);
    }

    .undo-trigger {
      background-color: var(--ios-blue);
      color: #78fefb;
      cursor: pointer;
      border: none;
      padding: 0 10px;
      min-width: 36px;
      height: 30px;
      border-radius: var(--button-corner-radius);
      user-select: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.08s ease, transform 0.08s ease;
      box-sizing: border-box;
    }

    .undo-trigger svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #78fefb;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .undo-trigger:active {
      background-color: var(--ios-blue-pressed);
      transform: scale(0.94);
    }

    #scanned-list {
      list-style-type: none;
      padding: 0;
      padding-bottom: 70px !important;
      margin: 0;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #2c2c2e; 
      border-radius: var(--app-corner-radius);
      background-color: #000000;
      overflow-y: auto;
      flex-grow: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: none;
      position: relative;
      z-index: 1;
    }

    #scanned-list.has-items {
      display: block;
    }

    .list-category-header {
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      z-index: 10;
      background-color: #1c1c1e;
      padding: 8px 18px;
      font-size: 12px;
      font-weight: 700;
      color: #a2a2a7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #2c2c2e;
      margin: 0;
    }

    #scanned-list li {
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 400;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0a0a0a;
      border-bottom: 1px solid #2c2c2e; 
      transition: background-color 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                  transform 0.55s cubic-bezier(0.25, 1, 0.5, 1), 
                  opacity 0.45s ease, 
                  max-height 0.45s cubic-bezier(0.25, 1, 0.5, 1), 
                  padding 0.45s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: background-color, transform, opacity, max-height;
      overflow: hidden;
      max-height: 60px;
    }

    #scanned-list li:last-child {
      border-bottom: none;
    }

    #scanned-list li span:first-child {
      color: #ffffff;
    }

    @keyframes rowPulseGreen {
      0% {
        background-color: #009945;
      }
      100% {
        background-color: #0a0a0a;
      }
    }

    #scanned-list li.pulse-new-item {
      animation: rowPulseGreen 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    #scanned-list li.undo-target-glow {
      background-color: var(--status-red) !important;
    }

    #scanned-list li.undo-slide-out {
      background-color: var(--status-red) !important;
      transform: translateX(-105%);
      opacity: 0.2;
    }

    #scanned-list li.undo-collapse {
      max-height: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      border-bottom: none !important;
      opacity: 0 !important;
    }

    .status-flash { 
      color: #00db62; 
      font-weight: 500; 
      font-size: 15px; 
    }

    #control-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: calc(var(--tg-safe-bottom) + 6px);
      padding-top: 40px;
      z-index: 20;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 45%, rgba(0,0,0,1) 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
    }

    .btn-complete-wrap {
      position: relative;
      width: 100%;
      pointer-events: auto;
    }

    .btn {
      position: relative;
      width: 100%;
      padding: 15px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.2px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background-color: #ffffff;
      color: #000000;
      z-index: 2;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.05s ease, transform 0.05s ease;
    }

    .btn:active {
      background-color: #e5e5ea !important;
      transform: scale(0.98);
    }

    .btn-complete-wrap::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 4%;
      width: 92%;
      height: 88%;
      background: #ffffff;
      border-radius: 14px;
      filter: blur(18px);
      opacity: 0.35;
      z-index: 1;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      transform: translate3d(0, 0, 0);
      will-change: filter, opacity;
      transition: opacity 0.3s ease;
    }

    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 999;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.38s cubic-bezier(0.25, 1, 0.5, 1);
    }

    #modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: 100%;
      max-width: 420px;
      max-height: 72vh;
      background: rgba(28, 28, 30, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--app-corner-radius);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.65);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: scale(0.92);
      transition: transform 0.38s cubic-bezier(0.25, 1, 0.5, 1);
    }

    #modal-overlay.active .modal-card {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      min-height: 52px;
      max-height: 52px;
      background: rgba(44, 44, 46, 0.6);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      box-sizing: border-box;
    }

    .modal-header h4 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #a2a2a7;
      font-weight: 700;
    }

    .header-actions {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 32px;
    }

    .edit-btn {
      position: absolute;
      right: 0;
      background: var(--ios-blue);
      border: none;
      color: #78fefb;
      padding: 0 14px;
      border-radius: var(--button-corner-radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transform: scale(1) translateX(0);
      transform-origin: right center;
      transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1), 
                  opacity 0.32s cubic-bezier(0.25, 1, 0.5, 1),
                  background-color 0.15s ease;
      pointer-events: auto;
      white-space: nowrap;
    }

    .edit-btn:active {
      background-color: var(--ios-blue-pressed);
    }

    .edit-actions-group {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      opacity: 0;
      transform: scale(0.9) translateX(10px);
      transform-origin: right center;
      pointer-events: none;
      transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1), 
                  opacity 0.32s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .is-editing .edit-btn {
      opacity: 0;
      transform: scale(0.85) translateX(8px);
      pointer-events: none;
    }

    .is-editing .edit-actions-group {
      opacity: 1;
      transform: scale(1) translateX(0);
      pointer-events: auto;
    }

    .action-btn-cancel {
      background: #2c2c2e;
      border: none;
      color: #ffffff;
      padding: 0;
      width: 32px;
      height: 32px;
      border-radius: var(--button-corner-radius);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease, transform 0.1s ease;
      box-sizing: border-box;
    }

    .action-btn-cancel:active {
      background: #3a3a3c;
      transform: scale(0.94);
    }

    .action-btn-cancel svg {
      width: 14px;
      height: 14px;
      stroke: #ffffff;
      stroke-width: 2.2;
      stroke-linecap: round;
      display: block;
    }

    .action-btn-delete {
      border: none;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      height: 32px;
      border-radius: var(--button-corner-radius);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-sizing: border-box;
      background-color: #2c2c2e;
      color: #7a3232;
      transition: background-color 0.38s cubic-bezier(0.25, 1, 0.5, 1), 
                  color 0.38s cubic-bezier(0.25, 1, 0.5, 1), 
                  transform 0.1s ease;
    }

    .action-btn-delete.has-selection {
      background-color: rgba(255, 59, 48, 0.22);
      color: var(--status-red);
    }

    .action-btn-delete.has-selection:active {
      background-color: rgba(255, 59, 48, 0.35);
      transform: scale(0.95);
    }

    .modal-body {
      overflow-y: auto;
      flex-grow: 1;
      padding: 0;
      position: relative;
    }

    .modal-list {
      list-style-type: none;
      padding: 0;
      margin: 0;
      width: 100%;
    }

    .modal-list li {
      position: relative;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 400;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0a0a0a;
      border-bottom: 1px solid #2c2c2e;
      overflow: hidden;
      max-height: 60px;
      opacity: 1;
      transition: max-height 0.45s cubic-bezier(0.25, 1, 0.5, 1),
                  opacity 0.45s cubic-bezier(0.25, 1, 0.5, 1),
                  padding 0.45s cubic-bezier(0.25, 1, 0.5, 1),
                  background-color 0.2s ease;
    }

    .modal-list li.deleting {
      max-height: 0 !important;
      opacity: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      border-bottom: none !important;
    }

    .modal-list li:last-child {
      border-bottom: none;
    }

    .modal-row-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      will-change: transform;
      transform: translateX(0px);
      /* Synced transition timing for smooth closing without late layout pops */
      transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .modal-list li span:first-child {
      color: #ffffff;
    }

    .selection-circle {
      position: absolute;
      left: -32px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid #545458;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform, opacity;
      transform: translateX(0px);
      opacity: 0;
      pointer-events: none;
      /* Smooth opacity fade combined with movement so they don't abruptly pop out of existence */
      transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1), 
                  opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1) ease,
                  background-color 0.15s ease, 
                  border-color 0.15s ease;
    }

    .selection-circle::after {
      content: '';
      width: 5px;
      height: 9px;
      border: solid #ffffff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) translate(-1px, -1px);
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .is-editing .modal-row-content {
      transform: translateX(36px);
    }

    .is-editing .selection-circle {
      transform: translateX(50px);
      opacity: 1;
      pointer-events: auto;
    }

    .is-editing .status-flash {
      display: none !important;
    }

    .modal-list li.selected-row {
      background-color: #1c1c1e !important;
    }

    .modal-list li.selected-row .selection-circle {
      background-color: var(--ios-blue);
      border-color: var(--ios-blue);
    }

    .modal-list li.selected-row .selection-circle::after {
      opacity: 1;
    }

    canvas#analysis-canvas {
      display: none;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="scanner-container">
      <div id="interactive"></div>
      
      <div id="custom-overlay">
        <div id="custom-viewfinder">
          <div class="scanner-corner tl"></div>
          <div class="scanner-corner tr"></div>
          <div class="scanner-corner bl"></div>
          <div class="scanner-corner br"></div>
        </div>
      </div>
    </div>

    <canvas id="analysis-canvas" width="120" height="90"></canvas>

    <div id="log-container">
      <div class="log-header-row">
        <h3>LOGGED SERIALS (<span id="count">0</span>)</h3>
        
        <div class="status-dots-group" id="statusDotsGroup">
          <span class="status-dot" id="dot-1"></span>
          <span class="status-dot" id="dot-2"></span>
          <span class="status-dot" id="dot-3"></span>
          <span class="status-dot" id="dot-4"></span>
        </div>

        <button type="button" class="undo-trigger" id="undo-btn">
          <svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
        </button>
      </div>
      
      <ul id="scanned-list"></ul>
    </div>

    <div id="control-panel">
      <div class="btn-complete-wrap">
        <button type="button" class="btn" id="done-btn">COMPLETE</button>
      </div>
    </div>
  </div>

  <div id="modal-overlay">
    <div class="modal-card" id="modal-card">
      <div class="modal-header" id="modal-header">
        <h4>LOGGED SERIALS (<span id="modal-count">0</span>)</h4>
        <div class="header-actions">
          <button class="edit-btn" id="modal-edit-btn">Edit</button>
          <div class="edit-actions-group">
            <button class="action-btn-cancel" id="edit-cancel-btn">
              <svg viewBox="0 0 16 16"><path d="M3 3l10 10M13 3L3 13"/></svg>
            </button>
            <button class="action-btn-delete" id="edit-delete-btn">Delete</button>
          </div>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-list" id="modal-scanned-list"></div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;

    function updateLayoutInsets() {
      if (!tg) return;

      const contentInset = tg.contentSafeAreaInset || tg.safeAreaInset;
      let topMargin = 56;
      let bottomMargin = 24;

      if (contentInset && contentInset.top > 0) {
        topMargin = contentInset.top + 8;
      }
      if (contentInset && contentInset.bottom > 0) {
        bottomMargin = contentInset.bottom + 10;
      }

      document.documentElement.style.setProperty('--tg-safe-top', `${topMargin}px`);
      document.documentElement.style.setProperty('--tg-safe-bottom', `${bottomMargin}px`);
    }

    if (tg) {
      tg.ready();
      tg.expand();

      if (typeof tg.requestFullscreen === 'function') {
        tg.requestFullscreen();
      }

      updateLayoutInsets();

      tg.onEvent('contentSafeAreaChanged', updateLayoutInsets);
      tg.onEvent('safeAreaChanged', updateLayoutInsets);
      tg.onEvent('fullscreenChanged', updateLayoutInsets);
    }

    const SECRET_KEY = "AkBR7!12K8Le#Bzz_ASH%PekMP45K416";

    let scannedCodes = [];
    const selectedSerialsInModal = new Set();
    
    const listElement = document.getElementById('scanned-list');
    const modalListElement = document.getElementById('modal-scanned-list');
    const countElement = document.getElementById('count');
    const modalCountElement = document.getElementById('modal-count');
    const viewfinder = document.getElementById('custom-viewfinder');
    const analysisCanvas = document.getElementById('analysis-canvas');
    const canvasCtx = analysisCanvas.getContext('2d', { willReadFrequently: true });
    
    const modalOverlay = document.getElementById('modal-overlay');
    const modalCard = document.getElementById('modal-card');
    const modalHeader = document.getElementById('modal-header');
    const editBtn = document.getElementById('modal-edit-btn');
    const editCancelBtn = document.getElementById('edit-cancel-btn');
    const editDeleteBtn = document.getElementById('edit-delete-btn');
    const doneBtn = document.getElementById('done-btn');

    const dotElements = [
      document.getElementById('dot-1'),
      document.getElementById('dot-2'),
      document.getElementById('dot-3'),
      document.getElementById('dot-4')
    ];

    let html5QrcodeScanner = null;
    let lastScannedCode = "";
    let lastScannedTime = 0;
    let flashTimeout = null;
    let overrideTimeout = null;
    let duplicatePulseTimeout = null;
    let isOverrideState = false;
    let proximityInterval = null;
    let isModalOpen = false;
    let isEditMode = false;
    let isUndoAnimating = false;
    
    let activeUniqueCode = null;

    function sanitizeScannedData(dataStr) {
      if (!dataStr) return "";
      return dataStr.replace(/[\x00-\x1F\x7F-\x9F]/g, "").trim();
    }

    function getRowByRawData(container, rawString) {
      if (!container || !rawString) return null;
      const allRows = container.querySelectorAll('li[data-raw]');
      for (let i = 0; i < allRows.length; i++) {
        if (allRows[i].getAttribute('data-raw') === rawString) {
          return allRows[i];
        }
      }
      return null;
    }

    function clearDotClasses() {
      dotElements.forEach(dot => {
        dot.className = 'status-dot';
      });
    }

    function setProximityLevel(level) {
      if (level === 1) {
        activeUniqueCode = null;
      }

      if (isOverrideState || isModalOpen) return;
      clearDotClasses();

      for (let i = 0; i < level; i++) {
        if (dotElements[i]) {
          dotElements[i].classList.add('active-white');
        }
      }
    }

    function triggerSuccessGreenState() {
      isOverrideState = true;
      clearTimeout(overrideTimeout);
      clearTimeout(duplicatePulseTimeout);
      clearDotClasses();
      dotElements.forEach(dot => dot.classList.add('active-green'));

      overrideTimeout = setTimeout(() => {
        isOverrideState = false;
        setProximityLevel(1);
      }, 700);
    }

    function triggerUnencryptedAmberState() {
      isOverrideState = true;
      clearTimeout(overrideTimeout);
      clearTimeout(duplicatePulseTimeout);
      clearDotClasses();
      dotElements[0].classList.add('active-amber');
      dotElements[1].classList.add('active-amber');
      dotElements[2].classList.add('active-amber');

      overrideTimeout = setTimeout(() => {
        isOverrideState = false;
        setProximityLevel(1);
      }, 900);
    }

    function triggerDuplicateBlueState() {
      isOverrideState = true;
      clearTimeout(overrideTimeout);
      clearTimeout(duplicatePulseTimeout);
      clearDotClasses();
      
      dotElements[0].classList.add('active-blue');
      dotElements[1].classList.add('active-blue');

      duplicatePulseTimeout = setTimeout(() => {
        isOverrideState = false;
        setProximityLevel(1);
      }, 500); 
    }

    function triggerUnreadableRedState() {
      isOverrideState = true;
      clearTimeout(overrideTimeout);
      clearTimeout(duplicatePulseTimeout);
      clearDotClasses();
      dotElements[0].classList.add('active-red');

      if (viewfinder) {
        clearTimeout(flashTimeout);
        viewfinder.classList.remove('scan-success');
        viewfinder.classList.add('scan-error');
        
        flashTimeout = setTimeout(() => {
          viewfinder.classList.remove('scan-error');
        }, 900);
      }

      tg?.HapticFeedback?.notificationOccurred('error');

      overrideTimeout = setTimeout(() => {
        isOverrideState = false;
        setProximityLevel(1);
      }, 900);
    }

    function tryDecrypt(rawText) {
      const sanitized = sanitizeScannedData(rawText);
      try {
        const trimmed = rawText.trim();
        let decryptedText = "";

        let bytes = CryptoJS.AES.decrypt(trimmed, SECRET_KEY);
        decryptedText = bytes.toString(CryptoJS.enc.Utf8);

        if (!decryptedText && /^[0-9a-fA-F]+$/.test(trimmed)) {
          const cipherTextWordArray = CryptoJS.enc.Hex.parse(trimmed);
          const cipherParams = CryptoJS.lib.CipherParams.create({
            ciphertext: cipherTextWordArray
          });
          
          bytes = CryptoJS.AES.decrypt(cipherParams, SECRET_KEY);
          decryptedText = bytes.toString(CryptoJS.enc.Utf8);
        }

        if (decryptedText && decryptedText.length > 0) {
          return { 
            text: sanitizeScannedData(decryptedText), 
            rawInput: sanitized,
            isEncrypted: true 
          };
        }
      } catch (err) {}

      return { 
        text: sanitized, 
        rawInput: sanitized,
        isEncrypted: false 
      };
    }

    function analyzeFrameProximity() {
      if (isOverrideState || isModalOpen) return;

      const videoElement = document.querySelector("#interactive video");
      if (!videoElement || videoElement.readyState < 2) return;

      try {
        canvasCtx.drawImage(videoElement, 0, 0, 120, 90);
        const imgData = canvasCtx.getImageData(30, 22, 60, 45).data;
        
        let totalContrast = 0;

        for (let i = 0; i < imgData.length; i += 8) {
          const r = imgData[i];
          if (i > 8) {
            const prevR = imgData[i - 8];
            totalContrast += Math.abs(r - prevR);
          }
        }

        const avgContrast = totalContrast / (imgData.length / 8);

        if (avgContrast < 12) {
          setProximityLevel(1);
        } else if (avgContrast >= 12 && avgContrast < 22) {
          setProximityLevel(2);
        } else if (avgContrast >= 22 && avgContrast < 35) {
          setProximityLevel(3);
        } else if (avgContrast >= 35) {
          setProximityLevel(4);
        }
      } catch (e) {}
    }

    function startScanner() {
      html5QrcodeScanner = new Html5Qrcode("interactive");
      
      const qrboxFunction = function(viewfinderWidth, viewfinderHeight) {
        let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
        let boxWidth = Math.floor(minEdgeSize * 0.75);
        let boxHeight = Math.floor(minEdgeSize * 0.55);
        return { width: boxWidth, height: boxHeight };
      }

      const config = { 
        fps: 15, 
        qrbox: qrboxFunction, 
        aspectRatio: 1.333334 
      };
      
      html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanError)
      .then(() => {
        setProximityLevel(1);
        proximityInterval = setInterval(analyzeFrameProximity, 100);
      })
      .catch((err) => alert("Camera setup error: " + err));
    }

    function onScanError(errorMessage) {
      if (isModalOpen) return;
      if (errorMessage && errorMessage.includes("ChecksumException")) {
        triggerUnreadableRedState();
      }
    }

    function updateDeleteButtonState() {
      if (selectedSerialsInModal.size > 0) {
        editDeleteBtn.classList.add('has-selection');
      } else {
        editDeleteBtn.classList.remove('has-selection');
      }
    }

    function buildGroupedDOM(targetContainer, isModal = false) {
      targetContainer.innerHTML = "";
      const groups = {};
      
      scannedCodes.forEach(item => {
        if (item.isEncrypted) {
          const match = item.text.match(/^\(([A-Za-z0-9\s_-]+)\)\s*(.+)$/);
          if (match) {
            const type = match[1].trim().toUpperCase();
            const sn = match[2].trim();
            if (!groups[type]) groups[type] = [];
            groups[type].push({ display: sn, raw: item.rawInput });
            return;
          }
        }
        
        if (!groups["OTHERS"]) groups["OTHERS"] = [];
        groups["OTHERS"].push({ display: item.text, raw: item.rawInput });
      });
      
      const itemHeaders = Object.keys(groups)
        .filter(h => h !== "OTHERS")
        .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
      
      if (groups["OTHERS"]) {
        itemHeaders.push("OTHERS");
      }
      
      itemHeaders.forEach(headerName => {
        const categoryItems = groups[headerName];
        const categoryCount = categoryItems.length;

        const headerLi = document.createElement('div');
        headerLi.className = 'list-category-header';
        headerLi.innerText = `${headerName} (${categoryCount})`;
        targetContainer.appendChild(headerLi);
        
        categoryItems.sort((a, b) => a.display.localeCompare(b.display, undefined, { numeric: true, sensitivity: 'base' }));
        
        categoryItems.forEach(item => {
          const li = document.createElement('li');
          li.setAttribute('data-raw', item.raw);

          if (isModal) {
            const isSelected = selectedSerialsInModal.has(item.raw);
            if (isSelected) li.classList.add('selected-row');

            li.innerHTML = `
              <div class="selection-circle"></div>
              <div class="modal-row-content">
                <span>${item.display}</span>
                <span class="status-flash">✓</span>
              </div>
            `;

            li.addEventListener('click', () => {
              if (!isEditMode) return;

              if (selectedSerialsInModal.has(item.raw)) {
                selectedSerialsInModal.delete(item.raw);
                li.classList.remove('selected-row');
              } else {
                selectedSerialsInModal.add(item.raw);
                li.classList.add('selected-row');
                tg?.HapticFeedback?.impactOccurred('light');
              }
              updateDeleteButtonState();
            });
          } else {
            li.innerHTML = `<span>${item.display}</span><span class="status-flash">✓</span>`;
          }

          targetContainer.appendChild(li);
        });
      });
    }

    function pinRowToTop(container, rowElement) {
      if (!container || !rowElement) return;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const stickyHeader = container.querySelector('.list-category-header');
          const headerHeight = stickyHeader ? stickyHeader.offsetHeight : 0;

          const targetScrollTop = rowElement.offsetTop - headerHeight - 8;

          container.scrollTo({
            top: Math.max(0, targetScrollTop),
            behavior: 'smooth'
          });
        });
      });
    }

    function renderGroupedUI(newlyAddedRaw = null) {
      if (scannedCodes.length > 0) {
        listElement.classList.add('has-items');
      } else {
        listElement.classList.remove('has-items');
      }

      buildGroupedDOM(listElement, false);
      buildGroupedDOM(modalListElement, true);

      if (newlyAddedRaw) {
        const targetElement = getRowByRawData(listElement, newlyAddedRaw);
        if (targetElement) {
          pinRowToTop(listElement, targetElement);
          targetElement.classList.add('pulse-new-item');
          setTimeout(() => {
            targetElement.classList.remove('pulse-new-item');
          }, 1400);
        }
      }
    }

    function onScanSuccess(decodedText) {
      if (isModalOpen || isUndoAnimating) return;

      const now = Date.now();
      
      const result = tryDecrypt(decodedText);
      const processedText = result.text;
      const rawInput = result.rawInput;
      const isEncrypted = result.isEncrypted;

      if (!processedText || processedText.length === 0) {
        triggerUnreadableRedState();
        return;
      }

      if (viewfinder) {
        clearTimeout(flashTimeout);
        viewfinder.classList.remove('scan-error');
      }

      const isDuplicate = scannedCodes.some(item => item.rawInput === rawInput);

      if (isDuplicate) {
        if (activeUniqueCode === rawInput) {
          if (isEncrypted) {
            triggerSuccessGreenState();
          } else {
            triggerUnencryptedAmberState();
          }
        } else {
          triggerDuplicateBlueState();
        }
        
        if (viewfinder) {
          viewfinder.classList.add('scan-success');
          flashTimeout = setTimeout(() => {
            viewfinder.classList.remove('scan-success');
          }, 900); 
        }

        lastScannedTime = now;
        return;
      }

      activeUniqueCode = rawInput;

      if (isEncrypted) {
        triggerSuccessGreenState();
      } else {
        triggerUnencryptedAmberState();
      }

      if (viewfinder) {
        viewfinder.classList.add('scan-success');
        flashTimeout = setTimeout(() => {
          viewfinder.classList.remove('scan-success');
        }, 900); 
      }

      lastScannedCode = decodedText;
      lastScannedTime = now;

      scannedCodes.unshift({ text: processedText, rawInput: rawInput, isEncrypted: isEncrypted });
      countElement.innerText = scannedCodes.length;
      modalCountElement.innerText = scannedCodes.length;
      renderGroupedUI(rawInput);
      tg?.HapticFeedback?.notificationOccurred('success');
    }

    document.getElementById('custom-overlay').addEventListener('click', () => {
      if (!isModalOpen) {
        triggerUnreadableRedState();
      }
    });

    function openModal() {
      if (scannedCodes.length === 0) return;

      isModalOpen = true;
      modalOverlay.classList.add('active');
      tg?.HapticFeedback?.impactOccurred('medium');
    }

    function closeModal() {
      exitEditMode();
      modalOverlay.classList.remove('active');
      isModalOpen = false;
      setProximityLevel(1);
    }

    function enterEditMode() {
      isEditMode = true;
      updateDeleteButtonState();
      modalHeader.classList.add('is-editing');
      modalListElement.classList.add('is-editing');
    }

    function exitEditMode() {
      isEditMode = false;
      selectedSerialsInModal.clear();
      updateDeleteButtonState();
      modalHeader.classList.remove('is-editing');
      modalListElement.classList.remove('is-editing');
      
      const rowElements = modalListElement.querySelectorAll('li');
      rowElements.forEach(row => row.classList.remove('selected-row'));
    }

    editBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      tg?.HapticFeedback?.impactOccurred('light');
      enterEditMode();
    });

    editCancelBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      exitEditMode();
    });

    editDeleteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (selectedSerialsInModal.size === 0) return;

      tg?.HapticFeedback?.impactOccurred('heavy');
      setTimeout(() => {
        tg?.HapticFeedback?.impactOccurred('heavy');
      }, 160);

      const allModalRows = modalListElement.querySelectorAll('li');
      allModalRows.forEach(row => {
        const raw = row.getAttribute('data-raw');
        if (selectedSerialsInModal.has(raw)) {
          row.classList.add('deleting');
        }
      });

      setTimeout(() => {
        scannedCodes = scannedCodes.filter(item => !selectedSerialsInModal.has(item.rawInput));
        
        exitEditMode();

        setTimeout(() => {
          countElement.innerText = scannedCodes.length;
          modalCountElement.innerText = scannedCodes.length;
          renderGroupedUI();

          if (scannedCodes.length === 0) {
            closeModal();
          }
        }, 150);
      }, 380);
    });

    listElement.addEventListener('click', openModal);

    modalOverlay.addEventListener('click', (e) => {
      if (!modalCard.contains(e.target)) {
        closeModal();
      }
    });

    function sendSerialsBack(codeObjects) {
      if (proximityInterval) clearInterval(proximityInterval);
      
      const initDataUnsafe = tg?.initDataUnsafe;
      const chatId = initDataUnsafe?.user?.id;
      
      if (!chatId) {
        alert("System Error: Telegram chat context unavailable.");
        tg?.close();
        return;
      }

      const scriptBaseUrl = "https://script.google.com/macros/s/AKfycbwb1tV24CFzbcPD70iA09hprOUg7oMSq7hGCxavDbvr7WmRbsFfHuEtvPtQy2Y9flbtMQ/exec";
      
      const serialList = codeObjects.map(item => item.text);
      const serialsString = serialList.length > 0 ? serialList.join(",") : "No codes scanned";
      const serialsParam = encodeURIComponent(serialsString);
      const finalUrl = `${scriptBaseUrl}?chatId=${chatId}&serials=${serialsParam}`;

      const fetchPromise = fetch(finalUrl, { mode: 'no-cors' });
      const timeoutPromise = new Promise(resolve => setTimeout(resolve, 500));

      Promise.race([fetchPromise, timeoutPromise]).finally(() => {
        tg?.close();
      });
    }

    document.getElementById('undo-btn').addEventListener('click', () => {
      if (scannedCodes.length === 0 || isUndoAnimating) return;

      isUndoAnimating = true;
      const itemToDelete = scannedCodes[0];
      const targetElement = getRowByRawData(listElement, itemToDelete.rawInput);

      if (targetElement) {
        pinRowToTop(listElement, targetElement);
        
        targetElement.classList.add('undo-target-glow');
        tg?.HapticFeedback?.impactOccurred('medium');

        setTimeout(() => {
          targetElement.classList.add('undo-slide-out');
        }, 300);

        setTimeout(() => {
          targetElement.classList.add('undo-collapse');
        }, 600);

        setTimeout(() => {
          scannedCodes.shift();
          countElement.innerText = scannedCodes.length;
          modalCountElement.innerText = scannedCodes.length;
          lastScannedCode = "";
          lastScannedTime = 0;
          activeUniqueCode = null;
          isUndoAnimating = false;
          renderGroupedUI();
        }, 900);
      } else {
        scannedCodes.shift();
        countElement.innerText = scannedCodes.length;
        modalCountElement.innerText = scannedCodes.length;
        lastScannedCode = "";
        lastScannedTime = 0;
        activeUniqueCode = null;
        isUndoAnimating = false;
        renderGroupedUI();
        tg?.HapticFeedback?.impactOccurred('medium');
      }
    });

    doneBtn.addEventListener('pointerdown', () => {
      tg?.HapticFeedback?.impactOccurred('heavy');
    });

    doneBtn.addEventListener('click', () => {
      const container = document.querySelector('.app-container');
      const scannerContainer = document.getElementById('scanner-container');

      if (container) {
        container.classList.add('camera-stopped');
      }

      if (scannerContainer) {
        scannerContainer.style.display = 'none';
      }

      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop()
          .then(() => sendSerialsBack(scannedCodes))
          .catch(() => sendSerialsBack(scannedCodes));
      } else {
        sendSerialsBack(scannedCodes);
      }
    });

    window.addEventListener('DOMContentLoaded', startScanner);
  </script>
</body>
</html>
