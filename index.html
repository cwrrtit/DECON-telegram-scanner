<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Scanner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <!-- 🔐 CryptoJS Library for Client-Side AES Decryption -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <style>
    :root {
      --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);

      /* 🎨 STATUS INDICATOR COLORS */
      --status-red: #ff3b30;
      --status-amber: #f4cb11;
      --status-green: #00db62;
      --status-white: #ffffff;
      --status-idle-border: #3a3a3c;
    }
    
    body {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; 
      background-color: #000000;
      color: #ffffff;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    #scanner-container {
      position: relative; 
      width: 100%;
      max-width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #000000;
      margin-bottom: 16px;
    }

    #interactive {
      width: 100% !important;
      height: auto !important;
    }

    #interactive video {
      width: 100% !important;
      height: auto !important;
      object-fit: cover;
    }

    /* Wipes out default library box borders */
    #interactive * {
      border: none !important;
      border-color: transparent !important;
    }

    /* CUSTOM OVERLAY CONTAINER */
    #custom-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; 
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    /* CUSTOM VIEWFINDER BOX */
    #custom-viewfinder {
      position: relative;
      box-sizing: border-box;
      width: 75vw; 
      height: 55vw; 
      max-width: 75%;
      max-height: 55%;
      
      /* Dimmed Mask */
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
      border-radius: 20px; 
    }

    /* VIEWFINDER CORNERS */
    .scanner-corner {
      position: absolute;
      width: 36px; 
      height: 36px; 
      box-sizing: border-box;
      transition: border-color 0.2s ease, filter 0.2s ease;
    }

    .tl {
      top: -3px; left: -3px;
      border-top: 5px solid #ffffff !important;
      border-left: 5px solid #ffffff !important;
      border-right: none !important; 
      border-bottom: none !important;
      border-top-left-radius: 23px;
    }

    .tr {
      top: -3px; right: -3px;
      border-top: 5px solid #ffffff !important;
      border-right: 5px solid #ffffff !important;
      border-left: none !important; 
      border-bottom: none !important;
      border-top-right-radius: 23px;
    }

    .bl {
      bottom: -3px; left: -3px;
      border-bottom: 5px solid #ffffff !important;
      border-left: 5px solid #ffffff !important;
      border-right: none !important; 
      border-top: none !important;
      border-bottom-left-radius: 23px;
    }

    .br {
      bottom: -3px; right: -3px;
      border-bottom: 5px solid #ffffff !important;
      border-right: 5px solid #ffffff !important;
      border-left: none !important; 
      border-top: none !important;
      border-bottom-right-radius: 23px;
    }

    /* SUCCESS CORNER GLOW */
    #custom-viewfinder.scan-success .scanner-corner {
      border-color: #00db62 !important; 
      filter: drop-shadow(0px 0px 1px rgba(1, 231, 40, 0.555));
    }

    #log-container {
      width: 100%;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    /* Clean Log Header Row without top/bottom border line */
    .log-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 4px 12px 4px;
    }

    h3 {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      color: #a2a2a7; 
      letter-spacing: 0.4px;
      font-weight: 600;
    }

    /* 4-DOT DYNAMIC STATUS INDICATOR */
    .status-dots-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-sizing: border-box;
      background-color: transparent;
      border: 1px solid var(--status-idle-border);
      transition: background-color 0.25s ease-in-out, 
                  border-color 0.25s ease-in-out, 
                  box-shadow 0.25s ease-in-out,
                  opacity 0.25s ease-in-out;
    }

    /* Dot States */
    .status-dot.active-white {
      background-color: var(--status-white);
      border-color: var(--status-white);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
    }

    .status-dot.active-green {
      background-color: var(--status-green);
      border-color: var(--status-green);
      box-shadow: 0 0 8px rgba(0, 219, 98, 0.6);
    }

    .status-dot.active-amber {
      background-color: var(--status-amber);
      border-color: var(--status-amber);
      box-shadow: 0 0 8px rgba(244, 203, 17, 0.6);
    }

    .status-dot.active-red {
      background-color: var(--status-red);
      border-color: var(--status-red);
      box-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
    }

    /* Interactive Undo Button */
    .undo-trigger {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      color: #007aff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      background: none;
      border: none;
      padding: 0;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .undo-trigger:active {
      opacity: 0.6;
    }

    #scanned-list {
      list-style-type: none;
      padding: 0;
      margin: 0;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #2c2c2e; 
      border-radius: 10px;
      background-color: #000000;
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
    }

    .list-category-header {
      background-color: #1c1c1e;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 700;
      color: #a2a2a7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #2c2c2e;
    }

    #scanned-list li {
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 400;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #000000;
      border-bottom: 1px solid #2c2c2e; 
    }

    #scanned-list li:last-child {
      border-bottom: none;
    }

    #scanned-list li span:first-child {
      color: #ffffff;
    }

    .status-flash { 
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      color: #00db62; 
      font-weight: 500; 
      font-size: 15px; 
    }

    /* CONTROL PANEL & REFINED WHITE BUTTON WITH GLOW */
    #control-panel {
      position: relative;
      width: 100%;
      padding-bottom: calc(8px + var(--safe-area-inset-bottom));
    }

    .btn-complete-wrap {
      position: relative;
      width: 100%;
    }

    .btn {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      position: relative;
      width: 100%;
      padding: 14px;
      font-size: 13px; /* Refined smaller font */
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 12px; /* Updated corner radius */
      cursor: pointer;
      background-color: #ffffff; /* Refined pure white background */
      color: #000000;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    /* Mobile WebKit Optimized Ambient Backlight Glow */
    .btn-complete-wrap::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 5%;
      width: 90%;
      height: 85%;
      background: #ffffff;
      border-radius: 12px;
      filter: blur(16px);
      opacity: 0.35;
      z-index: 0;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      transform: translate3d(0, 0, 0);
      will-change: filter, opacity;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>

  <div id="scanner-container">
    <div id="interactive"></div>
    
    <div id="custom-overlay">
      <div id="custom-viewfinder">
        <div class="scanner-corner tl"></div>
        <div class="scanner-corner tr"></div>
        <div class="scanner-corner bl"></div>
        <div class="scanner-corner br"></div>
      </div>
    </div>
  </div>

  <div id="log-container">
    <div class="log-header-row">
      <h3>LOGGED SERIALS (<span id="count">0</span>)</h3>
      
      <!-- 4-Dot Status Indicator -->
      <div class="status-dots-group" id="statusDotsGroup">
        <span class="status-dot" id="dot-1"></span>
        <span class="status-dot" id="dot-2"></span>
        <span class="status-dot" id="dot-3"></span>
        <span class="status-dot" id="dot-4"></span>
      </div>

      <button type="button" class="undo-trigger" id="undo-btn">↩ Undo</button>
    </div>
    <ul id="scanned-list"></ul>
  </div>

  <div id="control-panel">
    <div class="btn-complete-wrap">
      <button type="button" class="btn" id="done-btn">COMPLETE</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();

    // 🔐 CONFIDENTIAL AES PASSPHRASE
    const SECRET_KEY = "AkBR7!12K8Le#Bzz_ASH%PekMP45K416";

    const scannedCodes = [];
    const listElement = document.getElementById('scanned-list');
    const countElement = document.getElementById('count');
    const viewfinder = document.getElementById('custom-viewfinder');
    
    // 4-Dot DOM Elements
    const dotElements = [
      document.getElementById('dot-1'),
      document.getElementById('dot-2'),
      document.getElementById('dot-3'),
      document.getElementById('dot-4')
    ];

    let html5QrcodeScanner = null;
    let lastScannedCode = "";
    let lastScannedTime = 0;
    let flashTimeout = null;
    let stateResetTimeout = null;
    
    // Proximity Simulation Tracker
    let currentProximity = 0;

    /**
     * Resets all dots to inactive hollow grey stroke
     */
    function clearDotClasses() {
      dotElements.forEach(dot => {
        dot.className = 'status-dot';
      });
    }

    /**
     * Sets Proximity Dots (1 to 4 White Dots)
     * @param {number} level - Level from 0 to 4
     */
    function setProximityLevel(level) {
      clearTimeout(stateResetTimeout);
      clearDotClasses();
      currentProximity = level;

      for (let i = 0; i < level; i++) {
        if (dotElements[i]) {
          dotElements[i].classList.add('active-white');
        }
      }
    }

    /**
     * Triggers Encrypted Scan State (4 Green Dots for >= 0.25s)
     */
    function triggerSuccessGreenState() {
      clearTimeout(stateResetTimeout);
      clearDotClasses();
      dotElements.forEach(dot => dot.classList.add('active-green'));

      stateResetTimeout = setTimeout(() => {
        setProximityLevel(1); // Return to default active camera level
      }, 350);
    }

    /**
     * Triggers Unencrypted / Raw Format State (1st Amber Dot)
     */
    function triggerUnencryptedAmberState() {
      clearTimeout(stateResetTimeout);
      clearDotClasses();
      dotElements[0].classList.add('active-amber');

      stateResetTimeout = setTimeout(() => {
        setProximityLevel(1);
      }, 1000);
    }

    /**
     * Triggers Damaged / Unreadable Code State (4 White -> 0.5s -> 1st Red Dot)
     */
    function triggerUnreadableRedState() {
      clearTimeout(stateResetTimeout);
      setProximityLevel(4); // Show maximum proximity white first

      stateResetTimeout = setTimeout(() => {
        clearDotClasses();
        dotElements[0].classList.add('active-red');
      }, 500);
    }

    /**
     * Decrypts AES Base64 or Hex encoded strings.
     * Returns { text: string, isEncrypted: boolean }
     */
    function tryDecrypt(rawText) {
      try {
        const trimmed = rawText.trim();
        let decryptedText = "";

        // 1. Attempt standard Base64 OpenSSL AES decryption
        let bytes = CryptoJS.AES.decrypt(trimmed, SECRET_KEY);
        decryptedText = bytes.toString(CryptoJS.enc.Utf8);

        // 2. If Base64 yields empty text and payload is valid Hex, attempt Hex parsing
        if (!decryptedText && /^[0-9a-fA-F]+$/.test(trimmed)) {
          const cipherTextWordArray = CryptoJS.enc.Hex.parse(trimmed);
          const cipherParams = CryptoJS.lib.CipherParams.create({
            ciphertext: cipherTextWordArray
          });
          
          bytes = CryptoJS.AES.decrypt(cipherParams, SECRET_KEY);
          decryptedText = bytes.toString(CryptoJS.enc.Utf8);
        }

        if (decryptedText && decryptedText.length > 0) {
          return { text: decryptedText, isEncrypted: true };
        }
      } catch (err) {
        // Fallback for unencrypted barcodes
      }

      return { text: rawText, isEncrypted: false };
    }

    function startScanner() {
      html5QrcodeScanner = new Html5Qrcode("interactive");
      
      const qrboxFunction = function(viewfinderWidth, viewfinderHeight) {
        let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
        let boxWidth = Math.floor(minEdgeSize * 0.75);
        let boxHeight = Math.floor(minEdgeSize * 0.55);
        return { width: boxWidth, height: boxHeight };
      }

      const config = { 
        fps: 15, 
        qrbox: qrboxFunction, 
        aspectRatio: 1.333334 
      };
      
      html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanError)
      .then(() => {
        setProximityLevel(1); // Default camera active state (1 White Dot)
      })
      .catch((err) => alert("Camera configuration failure: " + err));
    }

    /**
     * Continuous Frame Analysis Callback
     * Dynamically handles object proximity & unreadable code detection
     */
    function onScanError(errorMessage) {
      if (errorMessage && (errorMessage.includes("QR code parse error") || errorMessage.includes("DataMatrix"))) {
        triggerUnreadableRedState();
      } else {
        // Gentle background proximity simulation based on focus framing
        if (currentProximity === 0) {
          setProximityLevel(1);
        }
      }
    }

    function renderGroupedUI() {
      listElement.innerHTML = "";
      const groups = {};
      
      scannedCodes.forEach(code => {
        const match = code.match(/^\(([^)]+)\)(.*)$/);
        if (match) {
          const type = match[1].trim().toUpperCase();
          const sn = match[2].trim();
          if (!groups[type]) groups[type] = [];
          groups[type].push({ display: sn, raw: code });
        } else {
          if (!groups["OTHERS"]) groups["OTHERS"] = [];
          groups["OTHERS"].push({ display: code, raw: code });
        }
      });
      
      const itemHeaders = Object.keys(groups)
        .filter(h => h !== "OTHERS")
        .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
      
      if (groups["OTHERS"]) {
        itemHeaders.push("OTHERS");
      }
      
      itemHeaders.forEach(headerName => {
        const headerLi = document.createElement('div');
        headerLi.className = 'list-category-header';
        headerLi.innerText = headerName;
        listElement.appendChild(headerLi);
        
        groups[headerName].sort((a, b) => a.display.localeCompare(b.display, undefined, { numeric: true, sensitivity: 'base' }));
        
        groups[headerName].forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<span>${item.display}</span><span class="status-flash">✓</span>`;
          listElement.appendChild(li);
        });
      });
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();
      
      // Decrypt or evaluate format logic
      const result = tryDecrypt(decodedText);
      const processedText = result.text;
      const isEncrypted = result.isEncrypted;

      // Update 4-dot status indicator based on encryption payload
      if (isEncrypted) {
        triggerSuccessGreenState();
      } else {
        triggerUnencryptedAmberState();
      }

      if (viewfinder) {
        clearTimeout(flashTimeout);
        viewfinder.classList.add('scan-success');
        flashTimeout = setTimeout(() => {
          viewfinder.classList.remove('scan-success');
        }, 500); 
      }

      if (decodedText === lastScannedCode && (now - lastScannedTime) < 2000) return;

      lastScannedCode = decodedText;
      lastScannedTime = now;

      if (!scannedCodes.includes(processedText)) {
        scannedCodes.unshift(processedText);
        countElement.innerText = scannedCodes.length;
        renderGroupedUI();
        tg?.HapticFeedback?.notificationOccurred('success');
      }
    }

    function sendSerialsBack(serialList) {
      const initDataUnsafe = tg?.initDataUnsafe;
      const chatId = initDataUnsafe?.user?.id;
      
      if (!chatId) {
        alert("System Error: Telegram chat context is unavailable.");
        return;
      }

      const scriptBaseUrl = "https://script.google.com/macros/s/AKfycbwb1tV24CFzbcPD70iA09hprOUg7oMSq7hGCxavDbvr7WmRbsFfHuEtvPtQy2Y9flbtMQ/exec";
      const serialsParam = encodeURIComponent(serialList.join(","));
      const finalUrl = `${scriptBaseUrl}?chatId=${chatId}&serials=${serialsParam}`;

      fetch(finalUrl, { method: "GET" })
      .then(() => {
        setTimeout(() => {
          tg?.close();
        }, 150);
      })
      .catch((err) => {
        tg?.close();
      });
    }

    document.getElementById('undo-btn').addEventListener('click', () => {
      if (scannedCodes.length > 0) {
        scannedCodes.shift();
        countElement.innerText = scannedCodes.length;
        lastScannedCode = "";
        lastScannedTime = 0;
        renderGroupedUI();
        tg?.HapticFeedback?.impactOccurred('medium');
      }
    });

    document.getElementById('done-btn').addEventListener('click', () => {
      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop()
          .then(() => sendSerialsBack(scannedCodes))
          .catch(() => sendSerialsBack(scannedCodes));
      } else {
        sendSerialsBack(scannedCodes);
      }
    });

    window.addEventListener('DOMContentLoaded', startScanner);
  </script>
</body>
</html>
