<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Scanner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <!-- 🔐 Client-Side AES Decryption -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <style>
    :root {
      /* Dynamic Inset Placeholders with Safe Native Fallbacks */
      --tg-safe-top: 56px;
      --tg-safe-bottom: 24px;

      /* 🎨 TIGHTER CORNER RADIUS (MATCHES REDDIT POST IMAGE FRAME) */
      --app-corner-radius: 16px;

      /* 🎨 STATUS INDICATOR COLORS */
      --status-red: #ff3b30;
      --status-amber: #f4cb11;
      --status-green: #00db62;
      --status-white: #ffffff;
      --status-idle-border: #3a3a3c;
    }
    
    * {
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace !important;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: #ffffff;
      overflow: hidden; /* Lock page-level scroll so elements stay strictly pinned */
    }

    /* Main Viewport Container */
    .app-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      padding-top: var(--tg-safe-top);
      padding-bottom: 0px;
      padding-left: 16px;
      padding-right: 16px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      transition: padding-top 0.2s ease-out;
    }

    /* Substantially increases top clearance once camera stops */
    .app-container.camera-stopped {
      padding-top: calc(var(--tg-safe-top) + 70px) !important;
    }

    /* 🍏 CAMERA FEED CONTAINER WITH 16px RADIUS */
    #scanner-container {
      position: relative; 
      width: 100%;
      max-width: 100%;
      border-radius: var(--app-corner-radius);
      overflow: hidden;
      background: #000000;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    #interactive {
      width: 100% !important;
      height: auto !important;
    }

    #interactive video {
      width: 100% !important;
      height: auto !important;
      object-fit: cover;
    }

    #interactive * {
      border: none !important;
      border-color: transparent !important;
    }

    /* CUSTOM OVERLAY CONTAINER */
    #custom-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto; 
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    /* CUSTOM VIEWFINDER BOX */
    #custom-viewfinder {
      position: relative;
      box-sizing: border-box;
      width: 75vw; 
      height: 55vw; 
      max-width: 75%;
      max-height: 55%;
      
      /* Dimmed Mask */
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
      border-radius: 18px; 
      cursor: pointer;
    }

    /* VIEWFINDER CORNERS */
    .scanner-corner {
      position: absolute;
      width: 36px; 
      height: 36px; 
      box-sizing: border-box;
      transition: border-color 0.2s ease, filter 0.2s ease;
    }

    .tl {
      top: -3px; left: -3px;
      border-top: 4px solid #ffffff !important;
      border-left: 4px solid #ffffff !important;
      border-right: none !important; 
      border-bottom: none !important;
      border-top-left-radius: 21px;
    }

    .tr {
      top: -3px; right: -3px;
      border-top: 4px solid #ffffff !important;
      border-right: 4px solid #ffffff !important;
      border-left: none !important; 
      border-bottom: none !important;
      border-top-right-radius: 21px;
    }

    .bl {
      bottom: -3px; left: -3px;
      border-bottom: 4px solid #ffffff !important;
      border-left: 4px solid #ffffff !important;
      border-right: none !important; 
      border-top: none !important;
      border-bottom-left-radius: 21px;
    }

    .br {
      bottom: -3px; right: -3px;
      border-bottom: 4px solid #ffffff !important;
      border-right: 4px solid #ffffff !important;
      border-left: none !important; 
      border-top: none !important;
      border-bottom-right-radius: 21px;
    }

    /* SUCCESS CORNER GLOW */
    #custom-viewfinder.scan-success .scanner-corner {
      border-color: #00db62 !important; 
      filter: drop-shadow(0px 0px 1px rgba(1, 231, 40, 0.555));
    }

    /* RED CORNER GLOW FOR UNREADABLE CODE */
    #custom-viewfinder.scan-error .scanner-corner {
      border-color: #ff3b30 !important; 
      filter: drop-shadow(0px 0px 1px rgba(255, 59, 48, 0.555));
    }

    /* LOGGED SERIALS SECTION */
    #log-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      margin-bottom: 0px;
      position: relative;
    }

    .log-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 4px 10px 4px;
      flex-shrink: 0;
    }

    h3 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      color: #a2a2a7; 
      letter-spacing: 0.4px;
      font-weight: 600;
    }

    /* 4-DOT DYNAMIC STATUS INDICATOR */
    .status-dots-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-sizing: border-box;
      background-color: transparent;
      border: 1px solid var(--status-idle-border);
      transition: background-color 0.15s ease-in-out, 
                  border-color 0.15s ease-in-out, 
                  box-shadow 0.15s ease-in-out;
    }

    .status-dot.active-white {
      background-color: var(--status-white);
      border-color: var(--status-white);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
    }

    .status-dot.active-green {
      background-color: var(--status-green);
      border-color: var(--status-green);
      box-shadow: 0 0 8px rgba(0, 219, 98, 0.6);
    }

    .status-dot.active-amber {
      background-color: var(--status-amber);
      border-color: var(--status-amber);
      box-shadow: 0 0 8px rgba(244, 203, 17, 0.6);
    }

    .status-dot.active-red {
      background-color: var(--status-red);
      border-color: var(--status-red);
      box-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
    }

    .undo-trigger {
      color: #007aff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      background: none;
      border: none;
      padding: 0;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .undo-trigger:active {
      opacity: 0.6;
    }

    /* 🍏 BOUNDING BOX WITH MATCHED 16px RADIUS */
    #scanned-list {
      list-style-type: none;
      padding: 0;
      margin: 0;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #2c2c2e; 
      border-radius: var(--app-corner-radius);
      background-color: #000000;
      overflow-y: auto;
      max-height: 28vh;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: none;
    }

    #scanned-list.has-items {
      display: block;
    }

    .list-category-header {
      background-color: #1c1c1e;
      padding: 8px 18px;
      font-size: 12px;
      font-weight: 700;
      color: #a2a2a7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #2c2c2e;
    }

    #scanned-list li, .modal-list li {
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 400;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #000000;
      border-bottom: 1px solid #2c2c2e; 
    }

    #scanned-list li:last-child, .modal-list li:last-child {
      border-bottom: none;
    }

    #scanned-list li span:first-child, .modal-list li span:first-child {
      color: #ffffff;
    }

    .status-flash { 
      color: #00db62; 
      font-weight: 500; 
      font-size: 15px; 
    }

    /* ---------------------------------------------------- */
    /* 📌 PINNED BOTTOM PANEL WITH EXTENDED EXTENDED FADE  */
    /* ---------------------------------------------------- */
    #control-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: calc(var(--tg-safe-bottom) + 6px);
      padding-top: 52px;
      z-index: 20;
      pointer-events: none;

      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 45%, rgba(0,0,0,1) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      mask-image: linear-gradient(to bottom, transparent 0%, black 25%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25%);
    }

    .btn-complete-wrap {
      position: relative;
      width: 100%;
      pointer-events: auto;
    }

    /* STRICTLY OPAQUE SOLID BUTTON */
    .btn {
      position: relative;
      width: 100%;
      padding: 15px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.2px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background-color: #ffffff !important;
      opacity: 1 !important;
      color: #000000;
      z-index: 2;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn:active {
      transform: scale(0.98);
      opacity: 0.9 !important;
    }

    /* Outer Glow Effect */
    .btn-complete-wrap::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 4%;
      width: 92%;
      height: 88%;
      background: #ffffff;
      border-radius: 14px;
      filter: blur(18px);
      opacity: 0.35;
      z-index: 1;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      transform: translate3d(0, 0, 0);
      will-change: filter, opacity;
      transition: opacity 0.3s ease;
    }

    /* ---------------------------------------------------- */
    /* 🍏 iOS/TELEGRAM FROSTED POP-UP (16px RADIUS)        */
    /* ---------------------------------------------------- */
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 999;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    #modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: 100%;
      max-width: 420px;
      max-height: 72vh;
      background: rgba(28, 28, 30, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--app-corner-radius); /* Matched to 16px */
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.65);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: scale(0.92);
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    #modal-overlay.active .modal-card {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: rgba(44, 44, 46, 0.6);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-header h4 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #a2a2a7;
      font-weight: 700;
    }

    .modal-close-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: #ffffff;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 13px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .modal-body {
      overflow-y: auto;
      flex-grow: 1;
      padding: 0;
    }

    .modal-list {
      list-style-type: none;
      padding: 0;
      margin: 0;
      width: 100%;
    }

    canvas#analysis-canvas {
      display: none;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="scanner-container">
      <div id="interactive"></div>
      
      <div id="custom-overlay">
        <div id="custom-viewfinder">
          <div class="scanner-corner tl"></div>
          <div class="scanner-corner tr"></div>
          <div class="scanner-corner bl"></div>
          <div class="scanner-corner br"></div>
        </div>
      </div>
    </div>

    <canvas id="analysis-canvas" width="120" height="90"></canvas>

    <div id="log-container">
      <div class="log-header-row">
        <h3>LOGGED SERIALS (<span id="count">0</span>)</h3>
        
        <!-- 4-Dot Status Indicator -->
        <div class="status-dots-group" id="statusDotsGroup">
          <span class="status-dot" id="dot-1"></span>
          <span class="status-dot" id="dot-2"></span>
          <span class="status-dot" id="dot-3"></span>
          <span class="status-dot" id="dot-4"></span>
        </div>

        <button type="button" class="undo-trigger" id="undo-btn">↩ Undo</button>
      </div>
      
      <!-- Native Scrollable Bounding Box -->
      <ul id="scanned-list"></ul>
    </div>

    <!-- Pinned Bottom Complete Panel with Frosted Blend -->
    <div id="control-panel">
      <div class="btn-complete-wrap">
        <button type="button" class="btn" id="done-btn">COMPLETE</button>
      </div>
    </div>
  </div>

  <!-- 🍏 Frosted Pop-up Modal -->
  <div id="modal-overlay">
    <div class="modal-card" id="modal-card">
      <div class="modal-header">
        <h4>LOGGED SERIALS (<span id="modal-count">0</span>)</h4>
        <button class="modal-close-btn" id="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-list" id="modal-scanned-list"></div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;

    function updateLayoutInsets() {
      if (!tg) return;

      const contentInset = tg.contentSafeAreaInset || tg.safeAreaInset;
      let topMargin = 56;
      let bottomMargin = 24;

      if (contentInset && contentInset.top > 0) {
        topMargin = contentInset.top + 8;
      }
      if (contentInset && contentInset.bottom > 0) {
        bottomMargin = contentInset.bottom + 10;
      }

      document.documentElement.style.setProperty('--tg-safe-top', `${topMargin}px`);
      document.documentElement.style.setProperty('--tg-safe-bottom', `${bottomMargin}px`);
    }

    if (tg) {
      tg.ready();
      tg.expand();

      if (typeof tg.requestFullscreen === 'function') {
        tg.requestFullscreen();
      }

      updateLayoutInsets();

      tg.onEvent('contentSafeAreaChanged', updateLayoutInsets);
      tg.onEvent('safeAreaChanged', updateLayoutInsets);
      tg.onEvent('fullscreenChanged', updateLayoutInsets);
    }

    const SECRET_KEY = "AkBR7!12K8Le#Bzz_ASH%PekMP45K416";

    const scannedCodes = [];
    const listElement = document.getElementById('scanned-list');
    const modalListElement = document.getElementById('modal-scanned-list');
    const countElement = document.getElementById('count');
    const modalCountElement = document.getElementById('modal-count');
    const viewfinder = document.getElementById('custom-viewfinder');
    const analysisCanvas = document.getElementById('analysis-canvas');
    const canvasCtx = analysisCanvas.getContext('2d', { willReadFrequently: true });
    
    const modalOverlay = document.getElementById('modal-overlay');
    const modalCard = document.getElementById('modal-card');
    const modalCloseBtn = document.getElementById('modal-close-btn');

    const dotElements = [
      document.getElementById('dot-1'),
      document.getElementById('dot-2'),
      document.getElementById('dot-3'),
      document.getElementById('dot-4')
    ];

    let html5QrcodeScanner = null;
    let lastScannedCode = "";
    let lastScannedTime = 0;
    let flashTimeout = null;
    let overrideTimeout = null;
    let isOverrideState = false;
    let proximityInterval = null;
    let isModalOpen = false;

    function clearDotClasses() {
      dotElements.forEach(dot => {
        dot.className = 'status-dot';
      });
    }

    function setProximityLevel(level) {
      if (isOverrideState || isModalOpen) return;
      clearDotClasses();

      for (let i = 0; i < level; i++) {
        if (dotElements[i]) {
          dotElements[i].classList.add('active-white');
        }
      }
    }

    function triggerSuccessGreenState() {
      isOverrideState = true;
      clearTimeout(overrideTimeout);
      clearDotClasses();
      dotElements.forEach(dot => dot.classList.add('active-green'));

      overrideTimeout = setTimeout(() => {
        isOverrideState = false;
        setProximityLevel(1);
      }, 500);
    }

    function triggerUnencryptedAmberState() {
      isOverrideState = true;
      clearTimeout(overrideTimeout);
      clearDotClasses();
      dotElements[0].classList.add('active-amber');

      overrideTimeout = setTimeout(() => {
        isOverrideState = false;
        setProximityLevel(1);
      }, 800);
    }

    function triggerUnreadableRedState() {
      isOverrideState = true;
      clearTimeout(overrideTimeout);
      clearDotClasses();
      dotElements[0].classList.add('active-red');

      if (viewfinder) {
        viewfinder.classList.add('scan-error');
        setTimeout(() => viewfinder.classList.remove('scan-error'), 800);
      }

      tg?.HapticFeedback?.notificationOccurred('error');

      overrideTimeout = setTimeout(() => {
        isOverrideState = false;
        setProximityLevel(1);
      }, 800);
    }

    function tryDecrypt(rawText) {
      try {
        const trimmed = rawText.trim();
        let decryptedText = "";

        let bytes = CryptoJS.AES.decrypt(trimmed, SECRET_KEY);
        decryptedText = bytes.toString(CryptoJS.enc.Utf8);

        if (!decryptedText && /^[0-9a-fA-F]+$/.test(trimmed)) {
          const cipherTextWordArray = CryptoJS.enc.Hex.parse(trimmed);
          const cipherParams = CryptoJS.lib.CipherParams.create({
            ciphertext: cipherTextWordArray
          });
          
          bytes = CryptoJS.AES.decrypt(cipherParams, SECRET_KEY);
          decryptedText = bytes.toString(CryptoJS.enc.Utf8);
        }

        if (decryptedText && decryptedText.length > 0) {
          return { text: decryptedText, isEncrypted: true };
        }
      } catch (err) {}

      return { text: rawText, isEncrypted: false };
    }

    function analyzeFrameProximity() {
      if (isOverrideState || isModalOpen) return;

      const videoElement = document.querySelector("#interactive video");
      if (!videoElement || videoElement.readyState < 2) return;

      try {
        canvasCtx.drawImage(videoElement, 0, 0, 120, 90);
        const imgData = canvasCtx.getImageData(30, 22, 60, 45).data;
        
        let totalContrast = 0;

        for (let i = 0; i < imgData.length; i += 8) {
          const r = imgData[i];
          if (i > 8) {
            const prevR = imgData[i - 8];
            totalContrast += Math.abs(r - prevR);
          }
        }

        const avgContrast = totalContrast / (imgData.length / 8);

        if (avgContrast < 12) {
          setProximityLevel(1);
        } else if (avgContrast >= 12 && avgContrast < 22) {
          setProximityLevel(2);
        } else if (avgContrast >= 22 && avgContrast < 35) {
          setProximityLevel(3);
        } else if (avgContrast >= 35) {
          setProximityLevel(4);
        }
      } catch (e) {}
    }

    function startScanner() {
      html5QrcodeScanner = new Html5Qrcode("interactive");
      
      const qrboxFunction = function(viewfinderWidth, viewfinderHeight) {
        let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
        let boxWidth = Math.floor(minEdgeSize * 0.75);
        let boxHeight = Math.floor(minEdgeSize * 0.55);
        return { width: boxWidth, height: boxHeight };
      }

      const config = { 
        fps: 15, 
        qrbox: qrboxFunction, 
        aspectRatio: 1.333334 
      };
      
      html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanError)
      .then(() => {
        setProximityLevel(1);
        proximityInterval = setInterval(analyzeFrameProximity, 100);
      })
      .catch((err) => alert("Camera setup error: " + err));
    }

    function onScanError(errorMessage) {
      if (isModalOpen) return;
      if (errorMessage && errorMessage.includes("ChecksumException")) {
        triggerUnreadableRedState();
      }
    }

    function buildGroupedDOM(targetContainer) {
      targetContainer.innerHTML = "";
      const groups = {};
      
      scannedCodes.forEach(code => {
        const match = code.match(/^\(([^)]+)\)(.*)$/);
        if (match) {
          const type = match[1].trim().toUpperCase();
          const sn = match[2].trim();
          if (!groups[type]) groups[type] = [];
          groups[type].push({ display: sn, raw: code });
        } else {
          if (!groups["OTHERS"]) groups["OTHERS"] = [];
          groups["OTHERS"].push({ display: code, raw: code });
        }
      });
      
      const itemHeaders = Object.keys(groups)
        .filter(h => h !== "OTHERS")
        .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
      
      if (groups["OTHERS"]) {
        itemHeaders.push("OTHERS");
      }
      
      itemHeaders.forEach(headerName => {
        const headerLi = document.createElement('div');
        headerLi.className = 'list-category-header';
        headerLi.innerText = headerName;
        targetContainer.appendChild(headerLi);
        
        groups[headerName].sort((a, b) => a.display.localeCompare(b.display, undefined, { numeric: true, sensitivity: 'base' }));
        
        groups[headerName].forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<span>${item.display}</span><span class="status-flash">✓</span>`;
          targetContainer.appendChild(li);
        });
      });
    }

    function renderGroupedUI() {
      if (scannedCodes.length > 0) {
        listElement.classList.add('has-items');
      } else {
        listElement.classList.remove('has-items');
      }

      buildGroupedDOM(listElement);
      buildGroupedDOM(modalListElement);
    }

    function onScanSuccess(decodedText) {
      if (isModalOpen) return;

      const now = Date.now();
      
      const result = tryDecrypt(decodedText);
      const processedText = result.text;
      const isEncrypted = result.isEncrypted;

      if (isEncrypted) {
        triggerSuccessGreenState();
      } else {
        triggerUnencryptedAmberState();
      }

      if (viewfinder) {
        clearTimeout(flashTimeout);
        viewfinder.classList.add('scan-success');
        flashTimeout = setTimeout(() => {
          viewfinder.classList.remove('scan-success');
        }, 500); 
      }

      if (decodedText === lastScannedCode && (now - lastScannedTime) < 2000) return;

      lastScannedCode = decodedText;
      lastScannedTime = now;

      if (!scannedCodes.includes(processedText)) {
        scannedCodes.unshift(processedText);
        countElement.innerText = scannedCodes.length;
        modalCountElement.innerText = scannedCodes.length;
        renderGroupedUI();
        tg?.HapticFeedback?.notificationOccurred('success');
      }
    }

    document.getElementById('custom-overlay').addEventListener('click', () => {
      if (!isModalOpen) {
        triggerUnreadableRedState();
      }
    });

    /* 🍏 POP-UP CONTROLS */
    function openModal() {
      if (scannedCodes.length === 0) return;

      isModalOpen = true;
      modalOverlay.classList.add('active');
      tg?.HapticFeedback?.impactOccurred('medium');
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      isModalOpen = false;
      setProximityLevel(1);
    }

    listElement.addEventListener('click', openModal);

    modalOverlay.addEventListener('click', (e) => {
      if (!modalCard.contains(e.target)) {
        closeModal();
      }
    });

    modalCloseBtn.addEventListener('click', closeModal);

    function sendSerialsBack(serialList) {
      if (proximityInterval) clearInterval(proximityInterval);
      
      const initDataUnsafe = tg?.initDataUnsafe;
      const chatId = initDataUnsafe?.user?.id;
      
      if (!chatId) {
        alert("System Error: Telegram chat context unavailable.");
        return;
      }

      const scriptBaseUrl = "https://script.google.com/macros/s/AKfycbwb1tV24CFzbcPD70iA09hprOUg7oMSq7hGCxavDbvr7WmRbsFfHuEtvPtQy2Y9flbtMQ/exec";
      const serialsParam = encodeURIComponent(serialList.join(","));
      const finalUrl = `${scriptBaseUrl}?chatId=${chatId}&serials=${serialsParam}`;

      fetch(finalUrl, { method: "GET" })
      .then(() => {
        setTimeout(() => tg?.close(), 150);
      })
      .catch(() => tg?.close());
    }

    document.getElementById('undo-btn').addEventListener('click', () => {
      if (scannedCodes.length > 0) {
        scannedCodes.shift();
        countElement.innerText = scannedCodes.length;
        modalCountElement.innerText = scannedCodes.length;
        lastScannedCode = "";
        lastScannedTime = 0;
        renderGroupedUI();
        tg?.HapticFeedback?.impactOccurred('medium');
      }
    });

    document.getElementById('done-btn').addEventListener('click', () => {
      const container = document.querySelector('.app-container');
      const scannerContainer = document.getElementById('scanner-container');

      if (container) {
        container.classList.add('camera-stopped');
      }

      if (scannerContainer) {
        scannerContainer.style.display = 'none';
      }

      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop()
          .then(() => sendSerialsBack(scannedCodes))
          .catch(() => sendSerialsBack(scannedCodes));
      } else {
        sendSerialsBack(scannedCodes);
      }
    });

    window.addEventListener('DOMContentLoaded', startScanner);
  </script>
</body>
</html>
