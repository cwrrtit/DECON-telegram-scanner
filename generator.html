<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Mobile Responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AES Barcode Label Generator</title>
  
  <!-- CryptoJS Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <!-- BWIP-JS Library (for Data Matrix rendering) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bwip-js/4.10.0/bwip-js-min.js"></script>

  <style>
    /* Global Monospace Styling */
    * {
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
    }

    body {
      background-color: #121212;
      color: #ffffff;
      padding: 16px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    h2 {
      font-size: 18px;
      color: #f4cb11;
      text-transform: uppercase;
      margin-top: 8px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    label {
      font-size: 12px;
      color: #a2a2a7;
      display: block;
      margin-top: 14px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 12px;
      background: #1c1c1e;
      border: 1px solid #2c2c2e;
      color: #ffffff;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: #f4cb11;
    }

    /* Primary Button with Ambient Backlight Glow */
    .btn-primary {
      position: relative;
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background-color: #f4cb11;
      color: #000000;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
      z-index: 1; /* Keeps text above glow layer */
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    /* Ambient Yellow Backlight */
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 10px; /* Shifts glow downwards */
      left: 5%;
      width: 90%;
      height: 100%;
      background: #f4cb11;
      border-radius: inherit;
      filter: blur(20px); /* Soft glass diffusion */
      opacity: 0.45; /* Light intensity */
      z-index: -1; /* Behind button */
      transition: opacity 0.3s ease, filter 0.3s ease;
    }

    .btn-primary:hover::before {
      opacity: 0.65;
      filter: blur(24px);
    }

    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-secondary {
      position: relative;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background-color: #2c2c2e;
      color: #00db62;
      margin-top: 16px;
      display: none;
    }

    .output-box {
      margin-top: 24px;
      padding: 14px;
      background: #1c1c1e;
      border: 1px solid #2c2c2e;
      border-radius: 8px;
      word-break: break-all;
      font-size: 13px;
      line-height: 1.4;
    }

    #encryptedOutput {
      margin-top: 8px;
      margin-bottom: 0;
      color: #00db62;
      font-size: 13px;
    }

    .matrix-wrapper {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      padding: 24px;
      border-radius: 8px;
    }

    /* Hidden working canvas */
    #datamatrixCanvas {
      display: none;
    }

    /* Long-pressable image display */
    #matrixImage {
      max-width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Encryptor</h2>

    <label>Secret Key</label>
    <input type="text" id="secretKey" value="AkBR7!12K8Le#Bzz_ASH%PekMP45K416">

    <label>Item Name + Serial Number</label>
    <input type="text" id="serialInput" value="(DMP-12)MID 21637">

    <button class="btn-primary" onclick="generateEncryptedLabel()">Generate</button>

    <div class="output-box" id="resultBox" style="display:none;">
      <strong style="color: #a2a2a7;">Encrypted String (Copy into Label Maker):</strong>
      <p id="encryptedOutput"></p>
    </div>

    <div class="matrix-wrapper" id="matrixContainer" style="display:none;">
      <canvas id="datamatrixCanvas"></canvas>
      <img id="matrixImage" alt="Data Matrix Label" />
    </div>

    <button id="downloadBtn" class="btn-secondary" onclick="downloadLabel()">Save Image</button>
  </div>

  <script>
    function generateEncryptedLabel() {
      const rawText = document.getElementById('serialInput').value.trim();
      const key = document.getElementById('secretKey').value.trim();

      if (!rawText) {
        alert("Please enter a serial string.");
        return;
      }

      // 1. Encrypt using exact CryptoJS OpenSSL passphrase format
      const encryptedBytes = CryptoJS.AES.encrypt(rawText, key);
      const encryptedString = encryptedBytes.toString();

      // 2. Display encrypted string output
      document.getElementById('resultBox').style.display = 'block';
      document.getElementById('encryptedOutput').innerText = encryptedString;

      // 3. Render Data Matrix on hidden canvas
      try {
        const canvas = document.getElementById('datamatrixCanvas');
        bwipjs.toCanvas(canvas, {
          bcid:        'datamatrix',
          text:        encryptedString,
          scale:       5,
          padding:     10,
          backgroundcolor: 'FFFFFF'
        });

        // 4. Export canvas payload directly to long-pressable <img> tag
        const imgElement = document.getElementById('matrixImage');
        imgElement.src = canvas.toDataURL('image/png');

        document.getElementById('matrixContainer').style.display = 'flex';
        document.getElementById('downloadBtn').style.display = 'block';
      } catch (e) {
        alert("Error rendering Data Matrix: " + e);
      }
    }

    function downloadLabel() {
      const canvas = document.getElementById('datamatrixCanvas');
      const rawText = document.getElementById('serialInput').value.trim() || 'label';
      
      const filename = rawText.replace(/[^a-zA-Z0-9-_]/g, '_') + '_DataMatrix.png';

      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
